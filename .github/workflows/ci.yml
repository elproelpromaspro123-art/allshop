name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          
      - name: Install dependencies
        run: npm ci
        
      - name: Lint
        run: npm run lint
        
      - name: Test
        run: npm run test
        
      - name: Build
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: 1
          # Add any required env vars for build time here
          # Note: Next.js build might require some of these to not throw errors
          # depending on how strictly the components check them during SSR/SSG
          CATALOG_ADMIN_PATH_TOKEN: "ci-dummy-token-123"
          CATALOG_ADMIN_ACCESS_CODE: "ci-dummy-access-code-012345"
          CSRF_SECRET: "ci-dummy-csrf-secret-validation"
